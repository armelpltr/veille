<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bahco — Veille Prix</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f0f0f; --surface: #1a1a1a; --surface2: #222;
    --border: #2e2e2e; --accent: #c8ff00; --accent-dim: rgba(200,255,0,0.12);
    --text: #f0f0f0; --muted: #777; --danger: #ff4444;
    --success: #4dff91; --mono: 'DM Mono', monospace; --sans: 'Syne', sans-serif;
  }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; padding: 40px 20px; }
  .wrap { max-width: 720px; margin: 0 auto; }
  header { margin-bottom: 48px; }
  .logo { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
  .logo-mark { width: 36px; height: 36px; background: var(--accent); border-radius: 6px; display: flex; align-items: center; justify-content: center; }
  .logo-mark svg { width: 20px; height: 20px; }
  h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.3px; }
  .subtitle { font-family: var(--mono); font-size: 12px; color: var(--muted); margin-top: 4px; }
  .field { margin-bottom: 20px; }
  label { display: block; font-family: var(--mono); font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
  input[type="text"], input[type="password"] {
    width: 100%; background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 12px 16px; font-family: var(--mono); font-size: 14px;
    color: var(--text); outline: none; transition: border-color 0.15s;
  }
  input:focus { border-color: var(--accent); }
  input::placeholder { color: var(--muted); }
  .sites-grid { display: flex; flex-wrap: wrap; gap: 10px; }
  .site-chip { position: relative; }
  .site-chip input[type="checkbox"] { position: absolute; opacity: 0; width: 0; height: 0; }
  .site-chip label {
    display: flex; align-items: center; gap: 8px; background: var(--surface);
    border: 1px solid var(--border); border-radius: 20px; padding: 7px 14px;
    font-family: var(--mono); font-size: 12px; color: var(--muted); cursor: pointer;
    transition: all 0.15s; text-transform: none; letter-spacing: 0; margin: 0; user-select: none;
  }
  .site-chip input:checked + label { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
  .site-chip label:hover { border-color: #555; color: var(--text); }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
  .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 10px; }
  .product-btn {
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    padding: 14px 16px; cursor: pointer; transition: all 0.15s; user-select: none;
  }
  .product-btn:hover:not(.disabled) { border-color: #555; }
  .product-btn.active { border-color: var(--accent); background: var(--accent-dim); }
  .product-btn.disabled { opacity: 0.35; cursor: default; }
  .product-btn-ref { font-family: var(--mono); font-size: 13px; font-weight: 500; color: var(--accent); margin-bottom: 6px; }
  .product-btn.disabled .product-btn-ref { color: var(--muted); }
  .product-btn-name { font-family: var(--mono); font-size: 11px; color: var(--muted); line-height: 1.5; }
  .btn {
    width: 100%; margin-top: 24px; background: var(--accent); color: #0f0f0f;
    border: none; border-radius: 8px; padding: 14px; font-family: var(--sans);
    font-size: 15px; font-weight: 700; cursor: pointer; transition: opacity 0.15s, transform 0.1s;
  }
  .btn:hover { opacity: 0.9; } .btn:active { transform: scale(0.99); } .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  #results { margin-top: 36px; }
  .results-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .results-title { font-family: var(--mono); font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
  .results-count { font-family: var(--mono); font-size: 11px; color: var(--accent); }
  .card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    padding: 20px; margin-bottom: 12px; animation: fadeIn 0.25s ease both;
  }
  .card.lowest { border-color: rgba(77,255,145,0.4); }
  .card.highest { border-color: rgba(255,68,68,0.3); }
  .card.ean-match { border-color: rgba(200,255,0,0.5); }
  @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
  .card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; }
  .badge-row { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; flex-wrap: wrap; }
  .store-badge {
    font-family: var(--mono); font-size: 10px; font-weight: 500;
    padding: 3px 8px; border-radius: 4px; background: var(--surface2);
    color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px;
  }
  .store-badge.lm { background: rgba(0,125,58,0.2); color: var(--success); }
  .ean-badge { font-family: var(--mono); font-size: 10px; padding: 3px 8px; border-radius: 4px; background: rgba(200,255,0,0.1); color: var(--accent); }
  .product-name { font-size: 15px; font-weight: 600; line-height: 1.3; }
  .product-snippet { font-family: var(--mono); font-size: 11px; color: var(--muted); margin-top: 8px; line-height: 1.5; }
  .price-block { text-align: right; flex-shrink: 0; }
  .price { font-family: var(--mono); font-size: 24px; font-weight: 500; }
  .price.found { color: var(--accent); }
  .card-bottom { display: flex; align-items: center; gap: 8px; margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border); flex-wrap: wrap; }
  .tag { font-family: var(--mono); font-size: 10px; padding: 3px 8px; border-radius: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
  .tag.low { background: rgba(77,255,145,0.1); color: var(--success); }
  .tag.high { background: rgba(255,68,68,0.1); color: var(--danger); }
  .tag.match { background: rgba(200,255,0,0.1); color: var(--accent); }
  .link-btn {
    margin-left: auto; font-family: var(--mono); font-size: 11px; color: var(--muted);
    background: none; border: 1px solid var(--border); border-radius: 4px;
    padding: 3px 10px; cursor: pointer; transition: all 0.15s; text-decoration: none; display: inline-block;
  }
  .link-btn:hover { border-color: #555; color: var(--text); }
  .loading { text-align: center; padding: 40px 0; font-family: var(--mono); font-size: 13px; color: var(--muted); }
  .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; margin-bottom: 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-box { background: rgba(255,68,68,0.08); border: 1px solid rgba(255,68,68,0.3); border-radius: 8px; padding: 16px; font-family: var(--mono); font-size: 12px; color: var(--danger); }
  .empty-state { text-align: center; padding: 40px 0; font-family: var(--mono); font-size: 13px; color: var(--muted); }
  .summary { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
  .stat { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; }
  .stat-label { font-family: var(--mono); font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 6px; }
  .stat-value { font-family: var(--mono); font-size: 20px; font-weight: 500; }
  .stat-value.green { color: var(--success); } .stat-value.red { color: var(--danger); } .stat-value.neutral { color: var(--text); }
  .divider { height: 1px; background: var(--border); margin: 28px 0; }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="logo">
      <div class="logo-mark">
        <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M10 3L17 7V13L10 17L3 13V7L10 3Z" stroke="#0f0f0f" stroke-width="1.5"/>
          <circle cx="10" cy="10" r="2.5" fill="#0f0f0f"/>
        </svg>
      </div>
      <h1>Veille Prix Bahco</h1>
    </div>
    <p class="subtitle">// recherche automatique par référence · EAN</p>
  </header>



  <div class="field">
    <label>Produit</label>
    <div class="products-grid" id="productsGrid">
      <div class="product-btn active" data-ref="P121-23" onclick="selectProduct(this)">
        <div class="product-btn-ref">P121-23</div>
        <div class="product-btn-name">Sécateur lame franche<br>BAHCO PRADINES · Ø 25 mm</div>
      </div>
      <div class="product-btn disabled" title="Bientôt disponible">
        <div class="product-btn-ref">+ ajouter</div>
        <div class="product-btn-name">Prochain produit</div>
      </div>
    </div>
  </div>

  <div class="divider"></div>

  <div class="field">
    <label>Sites à consulter</label>
    <div class="sites-grid">
      <div class="site-chip">
        <input type="checkbox" id="lm" checked>
        <label for="lm"><span class="dot"></span>Leroy Merlin</label>
      </div>
      <div class="site-chip">
        <input type="checkbox" id="casto" disabled>
        <label for="casto" style="opacity:0.4;cursor:default"><span class="dot"></span>Castorama <span style="font-size:9px">(bientôt)</span></label>
      </div>
      <div class="site-chip">
        <input type="checkbox" id="amz" disabled>
        <label for="amz" style="opacity:0.4;cursor:default"><span class="dot"></span>Amazon <span style="font-size:9px">(bientôt)</span></label>
      </div>
    </div>
  </div>

  <button class="btn" id="searchBtn" onclick="launchSearch()">Lancer la recherche</button>
  <div id="results"></div>
</div>

<script>

const TAVILY_API_KEY = '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';

let selectedRef = 'P121-23';

function selectProduct(el) {
  if (el.classList.contains('disabled')) return;
  document.querySelectorAll('.product-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  selectedRef = el.dataset.ref;
}

window.addEventListener('DOMContentLoaded', () => {

});

async function fetchLiveLMPrice(url, apiKey) {
  try {
    let extractData = null;
    for (const proxy of PROXIES) {
      try {
        const res = await fetch(proxy("https://api.tavily.com/extract"), {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ api_key: apiKey, urls: [url] })
        });
        if (res.ok) { extractData = await res.json(); break; }
      } catch(e) { continue; }
    }
    if (!extractData || !extractData.results || !extractData.results[0]) return null;
    const text = extractData.results[0].raw_content || '';

    // "Vendu XX,XX €" — prix de vente principal LM
    const venduMatch = text.match(/Vendu\s+(\d+)\s*[,.]\s*(\d{2})\s*€/);
    if (venduMatch) {
      const p = parseFloat(venduMatch[1] + '.' + venduMatch[2]);
      if (p > 5 && p < 2000) return p;
    }

    // Prix dans les balises JSON-LD (priceCurrency EUR)
    const offerMatch = text.match(/"priceCurrency"\s*:\s*"EUR"[^}]*"price"\s*:\s*"?([\d.]+)"?/);
    if (!offerMatch) {
      const offerMatch2 = text.match(/"price"\s*:\s*"?([\d.]+)"?[^}]*"priceCurrency"\s*:\s*"EUR"/);
      if (offerMatch2) {
        const p = parseFloat(offerMatch2[1]);
        if (p > 5 && p < 2000) return p;
      }
    } else {
      const p = parseFloat(offerMatch[1]);
      if (p > 5 && p < 2000) return p;
    }

    return null;
  } catch(e) { return null; }
}

function extractAllPrices(text) {
  const t = text.replace(/\u00a0/g, ' ').replace(/\s+/g, ' ');
  const re = /(\d{1,4})\s*[,.]\s*(\d{2})\s*€|(\d{1,4})\s*€(?![\d,.])/g;
  const seen = new Set();
  const prices = [];
  let m;
  while ((m = re.exec(t)) !== null) {
    const val = m[3] ? parseFloat(m[3]) : parseFloat(m[1] + '.' + m[2]);
    if (val > 1 && val < 2000 && !seen.has(val)) { seen.add(val); prices.push(val); }
  }
  return prices;
}

function extractPrice(text) {
  const t = text.replace(/\u00a0/g, ' ');
  // Gère : "29,90 €" / "29.90€" / "29 ,90 €" / "29 , 90 €"
  const re = /(\d{1,4})\s*[,.]\s*(\d{2})\s*€|(\d{1,4})\s*€(?![\d,.])/g;
  const prices = [];
  let m;
  while ((m = re.exec(t)) !== null) {
    const val = m[3] ? parseFloat(m[3]) : parseFloat(m[1] + '.' + m[2]);
    if (val > 1 && val < 2000) prices.push(val);
  }
  return prices.length ? Math.min(...prices) : null;
}

function eanInText(text, ean) {
  return ean && text.includes(ean);
}

async function launchSearch() {
  const query = selectedRef;
  const ean = '';
  const apiKey = TAVILY_API_KEY;
  const out = document.getElementById('results');
  const btn = document.getElementById('searchBtn');

  if (!query) return;
  if (!apiKey || apiKey.startsWith('__')) {
    alert('Clé Tavily non configurée.');
    return;
  }
  btn.disabled = true;
  btn.textContent = 'Recherche en cours...';

  const searchTerm = ean ? `${ean} ${query}`.trim() : `Bahco ${query}`;
  out.innerHTML = `<div class="loading"><div class="spinner"></div><br>Recherche "${searchTerm}" sur leroymerlin.fr...</div>`;

  try {
    const TAVILY_URL = "https://api.tavily.com/search";
    const PROXIES = [
      u => `https://corsproxy.io/?url=${encodeURIComponent(u)}`,
      u => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
      u => u
    ];

    const body = JSON.stringify({
      api_key: apiKey,
      query: `"${searchTerm}" leroymerlin prix`,
      search_depth: "basic",
      include_answer: false,
      include_raw_content: false,
      include_domains: ["leroymerlin.fr"],
      max_results: 5
    });

    // Étape 1 : recherche pour trouver l'URL du bon produit
    let data = null;
    for (const proxy of PROXIES) {
      try {
        const res = await fetch(proxy(TAVILY_URL), {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body
        });
        if (res.ok) { data = await res.json(); break; }
      } catch(e) { continue; }
    }

    if (!data) throw new Error("Impossible de joindre l'API Tavily. Vérifie ta connexion.");

    // Étape 2 : extract live sur les URLs trouvées pour prix frais
    const lmUrls = (data.results || [])
      .filter(r => r.url.includes('leroymerlin.fr'))
      .map(r => r.url)
      .slice(0, 3);

    if (lmUrls.length > 0) {
      out.innerHTML = `<div class="loading"><div class="spinner"></div><br>Récupération des prix en direct...</div>`;
      try {
        let extractData = null;
        const extractBody = JSON.stringify({ urls: lmUrls });
        for (const proxy of PROXIES) {
          try {
            const res = await fetch(proxy("https://api.tavily.com/extract"), {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ api_key: apiKey, urls: lmUrls })
            });
            if (res.ok) { extractData = await res.json(); break; }
          } catch(e) { continue; }
        }
        if (extractData && extractData.results) {
          // Enrichir data.results avec le contenu live
          extractData.results.forEach(ex => {
            const orig = data.results.find(r => r.url === ex.url);
            if (orig && ex.raw_content) orig.raw_content = ex.raw_content.substring(0, 5000);
          });
        }
      } catch(e) { /* fallback sur cache */ }
    }
    const results = (data.results || []).filter(r => r.url.includes('leroymerlin.fr'));

    if (results.length === 0) {
      out.innerHTML = `<div class="empty-state">Aucun résultat sur leroymerlin.fr pour "${searchTerm}".<br><span style="font-size:11px;margin-top:8px;display:block">Vérifie la référence ou l'EAN.</span></div>`;
      return;
    }

    const refNorm = query.replace(/-/g, '').toLowerCase();

    const products = results.map(r => {
      const content = (r.raw_content || r.content || '');
      const titleNorm = r.title.toLowerCase().replace(/-/g, '');
      const urlNorm = r.url.toLowerCase().replace(/-/g, '');
      const isLMDirect = /vendu par leroy merlin/i.test(content);
      const isMarketplace = !isLMDirect && /vendu par(?!\s+leroy merlin)/i.test(content);
      const refInTitle = refNorm && titleNorm.includes(refNorm);
      const refInUrl = refNorm && urlNorm.includes(refNorm);
      return {
        product_name: r.title.replace(/\s*[\|–-]\s*Leroy Merlin.*$/i, '').trim(),
        price: extractPrice(content),
        allPrices: extractAllPrices(content),
        snippet: content.substring(0, 200).trim(),
        url: r.url,
        ean_match: eanInText(content, ean) || eanInText(r.title, ean),
        is_lm_direct: isLMDirect,
        is_marketplace: isMarketplace,
        ref_match: refInTitle || refInUrl
      };
    });

    // Priorité : ref dans titre/URL + vendu par LM direct
    const refMatchDirect = products.filter(p => p.ref_match && p.is_lm_direct);
    const refMatchAll   = products.filter(p => p.ref_match);
    const lmDirectProducts = products.filter(p => p.is_lm_direct);
    const eanMatches = refMatchDirect.filter(p => p.ean_match);

    const displayProducts =
      eanMatches.length      > 0 ? eanMatches :
      refMatchDirect.length  > 0 ? refMatchDirect :
      refMatchAll.length     > 0 ? refMatchAll :
      lmDirectProducts.length > 0 ? lmDirectProducts :
      products;

    const prices = displayProducts.map(p => p.price).filter(Boolean); // prix = max trouvé (hors livraison)
    const minPrice = prices.length ? Math.min(...prices) : null;
    const maxPrice = prices.length ? Math.max(...prices) : null;
    const avgPrice = prices.length ? prices.reduce((a,b) => a+b,0) / prices.length : null;

    let html = '';

    const excludedCount = products.length - displayProducts.length;

    if (excludedCount > 0) {
      html += `<div style="font-family:var(--mono);font-size:11px;color:var(--muted);margin-bottom:14px;">
        ✕ ${excludedCount} offre(s) marketplace exclue(s) — Leroy Merlin direct uniquement
      </div>`;
    }

    if (ean && eanMatches.length > 0) {
      html += `<div style="font-family:var(--mono);font-size:11px;color:var(--accent);margin-bottom:14px;">
        ✓ ${eanMatches.length} résultat(s) avec EAN ${ean} confirmé
      </div>`;
    } else if (ean && eanMatches.length === 0) {
      html += `<div style="font-family:var(--mono);font-size:11px;color:var(--muted);margin-bottom:14px;">
        ⚠ EAN ${ean} non trouvé dans les snippets — résultats par référence
      </div>`;
    }

    if (prices.length > 1) {
      html += `<div class="summary">
        <div class="stat"><div class="stat-label">Prix min</div><div class="stat-value green">${minPrice.toFixed(2)} €</div></div>
        <div class="stat"><div class="stat-label">Moyenne</div><div class="stat-value neutral">${avgPrice.toFixed(2)} €</div></div>
        <div class="stat"><div class="stat-label">Prix max</div><div class="stat-value red">${maxPrice.toFixed(2)} €</div></div>
      </div>`;
    }

    html += `<div class="results-header">
      <span class="results-title">Résultats</span>
      <span class="results-count">${displayProducts.length} page(s) — leroymerlin.fr</span>
    </div>`;

    const pricedProducts = displayProducts.filter(p => p.price);
    pricedProducts.forEach((p, i) => {
      const isLow = p.price && p.price === minPrice && prices.length > 1;
      const isHigh = p.price && p.price === maxPrice && prices.length > 1;
      html += `<div class="card ${p.ean_match ? 'ean-match' : ''} ${isLow ? 'lowest' : ''} ${isHigh ? 'highest' : ''}" style="animation-delay:${i*0.06}s">
        <div class="card-top">
          <div style="flex:1;min-width:0">
            <div class="badge-row">
              <span class="store-badge lm">Leroy Merlin</span>
              ${p.ean_match ? `<span class="ean-badge">EAN ✓</span>` : ''}
            </div>
            <div class="product-name">${p.product_name}</div>
            ${p.snippet ? `<div class="product-snippet">${p.snippet}…</div>` : ''}
          </div>
          <div class="price-block">
            ${p.allPrices && p.allPrices.length > 1
              ? `<div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
                  ${p.allPrices.map(pr => `
                    <div style="font-family:var(--mono);font-size:${pr === Math.max(...p.allPrices) ? '22' : '14'}px;
                      color:${pr === Math.max(...p.allPrices) ? 'var(--accent)' : 'var(--muted)'};
                      font-weight:${pr === Math.max(...p.allPrices) ? '500' : '400'}">
                      ${pr.toFixed(2)} €
                    </div>`).join('')}
                 </div>`
              : `<div class="price ${p.price ? 'found' : ''}">${p.price ? p.price.toFixed(2) + ' €' : '—'}</div>`
            }
          </div>
        </div>
        <div class="card-bottom">
          ${isLow ? '<span class="tag low">Moins cher</span>' : ''}
          ${isHigh ? '<span class="tag high">Plus cher</span>' : ''}
          ${p.ean_match ? '<span class="tag match">EAN confirmé</span>' : ''}
          <a class="link-btn" href="${p.url}" target="_blank">↗ voir le produit</a>
        </div>
      </div>`;
    });

    out.innerHTML = html;

  } catch(err) {
    out.innerHTML = `<div class="error-box">Erreur : ${err.message}</div>`;
  } finally {
    btn.disabled = false;
    btn.textContent = 'Lancer la recherche';
  }
}

</script>
</body>
</html>
