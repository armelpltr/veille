<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Veille Prix Bahco</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f0f;--surface:#1a1a1a;--border:#2e2e2e;
  --accent:#c8ff00;--accent-dim:rgba(200,255,0,0.12);
  --text:#f0f0f0;--muted:#777;--success:#4dff91;--danger:#ff4444;
  --mono:'DM Mono',monospace;--sans:'Syne',sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;padding:40px 20px}
.wrap{max-width:720px;margin:0 auto}
header{margin-bottom:48px}
.logo{display:flex;align-items:center;gap:12px;margin-bottom:8px}
.logo-mark{width:36px;height:36px;background:var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center}
h1{font-size:22px;font-weight:700;letter-spacing:-.3px}
.subtitle{font-family:var(--mono);font-size:12px;color:var(--muted);margin-top:4px}
.field{margin-bottom:20px}
label{display:block;font-family:var(--mono);font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px}
.product-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;cursor:pointer;transition:all .15s;user-select:none}
.product-btn:hover:not(.disabled){border-color:#555}
.product-btn.active{border-color:var(--accent);background:var(--accent-dim)}
.product-btn.disabled{opacity:.35;cursor:default}
.product-btn-ref{font-family:var(--mono);font-size:13px;font-weight:500;color:var(--accent);margin-bottom:6px}
.product-btn.disabled .product-btn-ref{color:var(--muted)}
.product-btn-name{font-family:var(--mono);font-size:11px;color:var(--muted);line-height:1.5}
.sites-grid{display:flex;flex-wrap:wrap;gap:10px}
.site-chip{position:relative}
.site-chip input[type=checkbox]{position:absolute;opacity:0;width:0;height:0}
.site-chip label{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:7px 14px;font-family:var(--mono);font-size:12px;color:var(--muted);cursor:pointer;transition:all .15s;text-transform:none;letter-spacing:0;margin:0;user-select:none}
.site-chip input:checked+label{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}
.dot{width:6px;height:6px;border-radius:50%;background:currentColor}
.btn{width:100%;margin-top:24px;background:var(--accent);color:#0f0f0f;border:none;border-radius:8px;padding:14px;font-family:var(--sans);font-size:15px;font-weight:700;cursor:pointer;transition:opacity .15s}
.btn:hover{opacity:.9}.btn:disabled{opacity:.4;cursor:not-allowed}
#results{margin-top:36px}
.results-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.results-title{font-family:var(--mono);font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
.results-count{font-family:var(--mono);font-size:11px;color:var(--accent)}
.summary{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px 16px}
.stat-label{font-family:var(--mono);font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}
.stat-value{font-family:var(--mono);font-size:20px;font-weight:500}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:12px;animation:fadeIn .25s ease both}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:16px}
.store-badge{font-family:var(--mono);font-size:10px;font-weight:500;padding:3px 8px;border-radius:4px;background:rgba(0,125,58,.2);color:var(--success);text-transform:uppercase;letter-spacing:.5px;display:inline-block;margin-bottom:6px}
.product-name{font-size:15px;font-weight:600;line-height:1.3}
.product-snippet{font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:8px;line-height:1.5}
.price{font-family:var(--mono);font-size:26px;font-weight:500;color:var(--accent);white-space:nowrap}
.card-bottom{display:flex;align-items:center;gap:8px;margin-top:14px;padding-top:14px;border-top:1px solid var(--border);flex-wrap:wrap}
.tag{font-family:var(--mono);font-size:10px;padding:3px 8px;border-radius:4px;text-transform:uppercase;letter-spacing:.5px}
.tag.lm-direct{background:rgba(77,255,145,.1);color:var(--success)}
.link-btn{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--muted);background:none;border:1px solid var(--border);border-radius:4px;padding:3px 10px;cursor:pointer;transition:all .15s;text-decoration:none;display:inline-block}
.link-btn:hover{border-color:#555;color:var(--text)}
.loading{text-align:center;padding:40px 0;font-family:var(--mono);font-size:13px;color:var(--muted)}
.spinner{display:inline-block;width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin-bottom:12px}
@keyframes spin{to{transform:rotate(360deg)}}
.error-box{background:rgba(255,68,68,.08);border:1px solid rgba(255,68,68,.3);border-radius:8px;padding:16px;font-family:var(--mono);font-size:12px;color:var(--danger)}
.info-row{font-family:var(--mono);font-size:11px;color:var(--muted);margin-bottom:14px}
.divider{height:1px;background:var(--border);margin:28px 0}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo">
      <div class="logo-mark">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <path d="M10 3L17 7V13L10 17L3 13V7L10 3Z" stroke="#0f0f0f" stroke-width="1.5"/>
          <circle cx="10" cy="10" r="2.5" fill="#0f0f0f"/>
        </svg>
      </div>
      <h1>Veille Prix Bahco</h1>
    </div>
    <p class="subtitle">// recherche automatique par référence produit</p>
  </header>

  <div class="field">
    <label>Produit</label>
    <div class="products-grid">
      <div class="product-btn active" data-ref="P121-23" onclick="selectProduct(this)">
        <div class="product-btn-ref">P121-23</div>
        <div class="product-btn-name">Sécateur lame franche<br>BAHCO PRADINES · Ø 25 mm</div>
      </div>
      <div class="product-btn disabled">
        <div class="product-btn-ref">+ ajouter</div>
        <div class="product-btn-name">Prochain produit</div>
      </div>
    </div>
  </div>

  <div class="divider"></div>

  <div class="field">
    <label>Sites à consulter</label>
    <div class="sites-grid">
      <div class="site-chip"><input type="checkbox" id="lm" checked><label for="lm"><span class="dot"></span>Leroy Merlin</label></div>
      <div class="site-chip"><input type="checkbox" id="casto" disabled><label for="casto" style="opacity:.4;cursor:default"><span class="dot"></span>Castorama <span style="font-size:9px">(bientôt)</span></label></div>
      <div class="site-chip"><input type="checkbox" id="amz" disabled><label for="amz" style="opacity:.4;cursor:default"><span class="dot"></span>Amazon <span style="font-size:9px">(bientôt)</span></label></div>
    </div>
  </div>

  <button class="btn" id="searchBtn" onclick="launchSearch()">Lancer la recherche</button>
  <div id="results"></div>
</div>

<script>
const TAVILY_KEY  = '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';
const SERPER_KEY  = '11912ba8e1e1203880fb09fd134e28fd3c9d4de5';

let selectedRef = 'P121-23';

function selectProduct(el) {
  if (el.classList.contains('disabled')) return;
  document.querySelectorAll('.product-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  selectedRef = el.dataset.ref;
}

function extractAllPrices(text) {
  if (!text) return [];
  const t = text.replace(/\u00a0/g,' ').replace(/\s+/g,' ');
  const re = /(\d{1,4})\s*[,.]\s*(\d{2})\s*€|(\d{1,4})\s*€(?![\d,.])/g;
  const seen = new Set();
  const out = [];
  let m;
  while ((m = re.exec(t)) !== null) {
    const v = m[3] ? parseFloat(m[3]) : parseFloat(m[1]+'.'+m[2]);
    if (v > 1 && v < 2000 && !seen.has(v)) { seen.add(v); out.push(v); }
  }
  return out;
}

async function getUrlsFromTavily(query) {
  console.log('[Tavily] searching:', query);
  try {
    const res = await fetch('https://api.tavily.com/search', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        api_key: TAVILY_KEY,
        query: `"${query}" leroymerlin prix`,
        search_depth: 'basic',
        include_domains: ['leroymerlin.fr'],
        max_results: 5
      })
    });
    const data = await res.json();
    console.log('[Tavily] results:', data.results?.length);
    return (data.results || []).filter(r =>
      r.url.includes('leroymerlin.fr') &&
      /vendu par leroy merlin/i.test(r.content || '')
    );
  } catch(e) {
    console.error('[Tavily] error:', e);
    return [];
  }
}

async function getPriceFromSerper(query) {
  console.log('[Serper] searching:', query);
  try {
    const res = await fetch('https://google.serper.dev/search', {
      method: 'POST',
      headers: {'Content-Type':'application/json','X-API-KEY': SERPER_KEY},
      body: JSON.stringify({q: `"${query}" leroymerlin.fr prix`, gl:'fr', hl:'fr', num:10})
    });
    console.log('[Serper] status:', res.status);
    if (!res.ok) return null;
    const data = await res.json();
    const lmResults = (data.organic || []).filter(r => (r.link||'').includes('leroymerlin.fr'));
    console.log('[Serper] LM results:', lmResults.length);
    lmResults.forEach(r => console.log('[Serper] snippet:', r.snippet));

    const candidates = [];
    for (const r of lmResults) {
      const prices = extractAllPrices(r.snippet || '').filter(p => p > 10);
      candidates.push(...prices.map(p => ({price: p, url: r.link})));
    }
    console.log('[Serper] price candidates:', candidates);
    if (!candidates.length) return null;

    const freq = {};
    candidates.forEach(({price}) => freq[price] = (freq[price]||0)+1);
    const best = Object.entries(freq).sort((a,b) => b[1]-a[1]||b[0]-a[0])[0];
    const bestPrice = parseFloat(best[0]);
    console.log('[Serper] best price:', bestPrice);
    return {price: bestPrice, url: candidates.find(c => c.price===bestPrice)?.url};
  } catch(e) {
    console.error('[Serper] error:', e);
    return null;
  }
}

async function launchSearch() {
  const out = document.getElementById('results');
  const btn = document.getElementById('searchBtn');
  const query = selectedRef;

  btn.disabled = true;
  btn.textContent = 'Recherche en cours...';
  out.innerHTML = '<div class="loading"><div class="spinner"></div><br>Recherche sur Leroy Merlin...</div>';

  try {
    // Étape 1 : Tavily → URLs LM
    const lmPages = await getUrlsFromTavily(query);
    console.log('[App] LM pages found:', lmPages.length);

    // Étape 2 : Serper → prix réel Google
    out.innerHTML = '<div class="loading"><div class="spinner"></div><br>Récupération du prix via Google...</div>';
    const serperResult = await getPriceFromSerper(query);
    console.log('[App] Serper price result:', serperResult);

    if (!lmPages.length && !serperResult) {
      out.innerHTML = `<div class="error-box">Aucun résultat trouvé pour "${query}" sur leroymerlin.fr.</div>`;
      return;
    }

    // Construction des cartes
    const price = serperResult?.price || null;
    let html = '';

    if (lmPages.length > 1) {
      html += `<div class="summary">
        <div class="stat"><div class="stat-label">Prix LM</div><div class="stat-value" style="color:var(--accent)">${price ? price.toFixed(2)+' €' : '—'}</div></div>
        <div class="stat"><div class="stat-label">Pages trouvées</div><div class="stat-value">${lmPages.length}</div></div>
        <div class="stat"><div class="stat-label">Marketplace exclues</div><div class="stat-value" style="color:var(--muted)">✕</div></div>
      </div>`;
    }

    html += `<div class="results-header">
      <span class="results-title">Résultats</span>
      <span class="results-count">${lmPages.length} page(s) — leroymerlin.fr</span>
    </div>`;

    // Garde uniquement la page dont la ref est dans le titre ou l'URL
    const refNorm = query.replace(/-/g,'').toLowerCase();
    const bestPage = lmPages.find(p =>
      p.title?.toLowerCase().replace(/-/g,'').includes(refNorm) ||
      p.url?.toLowerCase().replace(/-/g,'').includes(refNorm)
    ) || lmPages[0] || {
      title: `Sécateur à lame franche BAHCO PRADINES ${query}`,
      url: serperResult?.url || '',
      content: ''
    };

    const pages = [bestPage];

    pages.forEach((p, i) => {
      const name = p.title?.replace(/\s*[|–-]\s*Leroy Merlin.*/i,'').trim() || query;
      const snippet = (p.content||'').substring(0,180);
      html += `<div class="card" style="animation-delay:${i*.06}s">
        <div class="card-top">
          <div style="flex:1;min-width:0">
            <span class="store-badge">Leroy Merlin</span>
            <div class="product-name">${name}</div>
            ${snippet ? `<div class="product-snippet">${snippet}…</div>` : ''}
          </div>
          <div class="price">${price ? price.toFixed(2)+' €' : '—'}</div>
        </div>
        <div class="card-bottom">
          <span class="tag lm-direct">LM Direct</span>
          ${p.url ? `<a class="link-btn" href="${p.url}" target="_blank">↗ voir le produit</a>` : ''}
        </div>
      </div>`;
    });

    out.innerHTML = html;

  } catch(e) {
    console.error('[App] error:', e);
    out.innerHTML = `<div class="error-box">Erreur : ${e.message}</div>`;
  } finally {
    btn.disabled = false;
    btn.textContent = 'Lancer la recherche';
  }
}
</script>
</body>
</html>
